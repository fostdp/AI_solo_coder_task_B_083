service:
  name: "古代医学文献馆藏微环境监测系统"
  version: "2.0.0"
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"

clickhouse:
  host: "localhost"
  port: 8123
  user: "default"
  password: ""
  database: "ancient_medical_books"

mqtt:
  broker: "localhost"
  port: 1883
  username: ""
  password: ""
  topic_env: "library/env/+"
  topic_ph: "library/ph/+"
  qos: 1
  keepalive: 60
  reconnect_interval: 5

batch_writer:
  batch_size: 500
  flush_interval: 30
  max_queue_size: 10000
  tables:
    - name: "env_sensor_data"
      columns: ["timestamp", "sensor_id", "shelf_id", "slot_id", "temperature", "humidity", "light", "voc", "mold_spore", "sensor_type"]
    - name: "ph_sensor_data"
      columns: ["timestamp", "sensor_id", "shelf_id", "slot_id", "ph_value", "sensor_type"]
    - name: "alerts"
      columns: ["alert_id", "timestamp", "shelf_id", "slot_id", "alert_level", "alert_type", "alert_value", "threshold", "message", "is_handled"]
    - name: "comparison_data"
      columns: ["timestamp", "record_date", "library_name", "metric", "value", "percentile", "percentile_rank", "total_libraries", "is_anomaly", "data_source"]
    - name: "efficacy_evaluation"
      columns: ["timestamp", "prescription", "shelf_id", "slot_id", "treatment_group", "reduction_rate", "efficacy_mean", "efficacy_ci_low", "efficacy_ci_high", "posterior_mean", "posterior_var", "sample_size", "spores_before", "spores_after"]
    - name: "aging_prediction"
      columns: ["timestamp", "shelf_id", "slot_id", "paper_type", "ph_decay_rate", "predicted_lifetime_years", "ph_30d", "ph_90d", "ph_180d", "ph_365d", "severity"]
    - name: "mold_prediction"
      columns: ["timestamp", "shelf_id", "slot_id", "risk_score", "risk_level", "growth_rate", "predicted_spores_7d", "predicted_spores_30d", "is_active_mold"]
    - name: "spread_results"
      columns: ["prediction_date", "model_type", "shelf_id", "slot_id", "day", "S", "E", "I", "R", "infection_prob", "is_hotspot", "spread_from", "edge_weight"]
    - name: "book_meta"
      columns: ["book_id", "paper_type", "binding_type", "fiber_density", "ink_type", "ocr_confidence", "extraction_time"]

aging_engine:
  run_interval: 3600
  lookback_days: 7
  min_data_points: 3
  prediction_days: [30, 90, 180, 365]

mold_engine:
  run_interval: 1800
  default_mold_type: "mixed"
  prediction_days: [7, 30]

text_miner:
  run_interval: 86400
  ocr_simulate: true
  min_confidence: 0.7
  paper_type_keywords:
    "竹纸": "bamboo"
    "棉纸": "cotton"
    "皮纸": "cotton"
    "宣纸": "rice"
    "开化纸": "kaihua"
    "雪连纸": "xuelian"
  binding_types: ["线装", "蝴蝶装", "包背装", "梵夹装", "卷轴装"]
  repair_keywords: ["修复", "重装", "补缀", "托裱", "衬纸"]

efficacy_engine:
  run_interval: 3600
  control_group_shelves: ["SHELF-01", "SHELF-02"]
  treatment_group_shelves:
    yuncao: ["SHELF-03", "SHELF-04"]
    huangbo: ["SHELF-05", "SHELF-06"]
    yanye: ["SHELF-07", "SHELF-08"]
  bayesian_prior:
    alpha: 2.0
    beta: 2.0
  min_sample_size: 10
  ci_level: 0.95

comparator:
  run_interval: 86400
  run_hour: 2
  anomaly_percentile_threshold: 95.0
  csv_data_path: "data/cross_library_comparison.csv"
  libraries:
    - "本馆"
    - "国家图书馆"
    - "上海图书馆"
    - "南京图书馆"
    - "浙江图书馆"
    - "故宫博物院"
    - "北京大学图书馆"
    - "中国科学院图书馆"
  metrics: ["temperature", "humidity", "ph", "mold_spore"]

spread_engine:
  run_interval: 7200
  prediction_days: 30
  model_type: "SEIR"
  seir_params:
    beta: 0.3
    sigma: 0.2
    gamma: 0.1
    mu: 0.01
  edge_weight_params:
    distance_factor: 0.01
    ventilation_factor: 0.7
    adjacency_bonus: 1.5
  hotspot_threshold: 0.5
  ventilation_default: 0.5
  shelf_distance_default: 1.0

algorithms:
  arrhenius:
    R: 8.314
    A: 1.0e10
    pH_decay_rate_ref: 0.005
    ref_temp: 298.15
    ref_humidity: 50.0
    paper_types:
      bamboo:
        name: "竹纸"
        ph0: 6.5
        Ea: 78.0
        k_factor: 1.2
        strength_factor: 0.8
      cotton:
        name: "皮纸"
        ph0: 7.0
        Ea: 85.0
        k_factor: 0.7
        strength_factor: 1.3
      rice:
        name: "宣纸"
        ph0: 6.8
        Ea: 83.0
        k_factor: 0.9
        strength_factor: 1.0
      xuelian:
        name: "雪连纸"
        ph0: 7.5
        Ea: 92.0
        k_factor: 0.5
        strength_factor: 1.5
      kaihua:
        name: "开化纸"
        ph0: 7.2
        Ea: 90.0
        k_factor: 0.6
        strength_factor: 1.4
    paper_type_map:
      "竹纸": "bamboo"
      "棉纸": "cotton"
      "皮纸": "cotton"
      "麻纸": "cotton"
      "开化纸": "kaihua"
      "雪连纸": "xuelian"
      "宣纸": "rice"
      "bamboo": "bamboo"
      "cotton": "cotton"
      "rice": "rice"
      "xuelian": "xuelian"
      "kaihua": "kaihua"

  mold_growth:
    mold_types:
      aspergillus:
        name: "曲霉"
        opt_temp: 25.0
        min_temp: 10.0
        max_temp: 45.0
        opt_humidity: 85.0
        min_humidity: 65.0
        growth_rate: 1.0
        spore_production: 0.8
        paper_damage: 0.6
      penicillium:
        name: "青霉"
        opt_temp: 22.0
        min_temp: 5.0
        max_temp: 35.0
        opt_humidity: 80.0
        min_humidity: 70.0
        growth_rate: 0.8
        spore_production: 1.0
        paper_damage: 0.7
      chaetomium:
        name: "毛壳菌"
        opt_temp: 28.0
        min_temp: 15.0
        max_temp: 40.0
        opt_humidity: 90.0
        min_humidity: 75.0
        growth_rate: 0.7
        spore_production: 0.6
        paper_damage: 1.0
      trichoderma:
        name: "木霉"
        opt_temp: 27.0
        min_temp: 8.0
        max_temp: 38.0
        opt_humidity: 88.0
        min_humidity: 72.0
        growth_rate: 1.2
        spore_production: 0.9
        paper_damage: 0.8

alerts:
  thresholds:
    yellow_ph: 6.5
    orange_ph: 6.0
    red_ph: 5.5
    yellow_mold: 500.0
    orange_light: 50.0
    red_active_mold: true
  dedup_window: 300
  notification:
    dingtalk:
      enabled: true
      timeout: 10
    email:
      enabled: true
      timeout: 15
    websocket:
      enabled: true
      broadcast_interval: 5

notification:
  dingtalk:
    webhook: ""
  smtp:
    host: ""
    port: 25
    username: ""
    password: ""
    sender: "monitor@library.com"
    use_tls: true
  alert_emails:
    - "admin@library.com"

shelf_layout:
  total_shelves: 10
  rows: 10
  columns: 5
  layers: 6
  slots_per_shelf: 12

data_validation:
  temperature_range: [-10, 50]
  humidity_range: [0, 100]
  ph_range: [3, 9]
  light_range: [0, 1000]
  voc_range: [0, 2000]
  mold_spore_range: [0, 100000]

logging:
  version: 1
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: "console"
      level: "INFO"
    - type: "file"
      level: "WARNING"
      filename: "app.log"
